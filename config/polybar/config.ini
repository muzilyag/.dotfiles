[colors]
base = #101418
text = #eaecf0
surface0 = #27292d
surface1 = #404244
pink = #88a3e8
red = #fd7865
green = #2cb491
yellow = #ca982e
transparent = #00000000

[bar/main]
bottom = false
fixed-center = true
width = 100%:-24
height = 32pt
offset-x = 12
offset-y = 8
radius = 12
background = ${colors.base}
foreground = ${colors.text}
line-size = 3pt
border-size = 4pt
border-color = ${colors.transparent}
padding-left = 0 
padding-right = 1 
module-margin = 1
font-0 = "JetBrainsMono Nerd Font:size=16;2"
font-1 = "Font Awesome 6 Free:style=Solid:size=16;4"
font-2 = "JetBrainsMono Nerd Font:style=Bold:size=16;2"
modules-left = xworkspaces xwindow
modules-right = pulseaudio memory cpu battery xkeyboard date network powermenu
cursor-click = pointer
enable-ipc = true
wm-restack = bspwm
override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.surface0}
label-active-underline = ${colors.pink}
label-active-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-occupied-foreground = ${colors.text}
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.surface1}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
label-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5
format-volume = <label-volume>
format-volume-prefix = "󰕾"
format-volume-prefix-foreground = ${colors.pink}
label-volume = %percentage%%
label-volume-padding-left = 1
format-muted = <label-muted>
format-muted-prefix = "󰝟"
format-muted-foreground = ${colors.surface1}
label-muted = "muted"
label-muted-padding-left = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.pink}
label = %percentage_used%%
label-padding-left = 1

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.pink}
label = %percentage%%
label-padding-left = 1

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT1
adapter = ACAD
poll-interval = 5
last-full-capacity = true
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹
ramp-capacity-foreground = ${colors.green}
animation-charging-0 = 󰂄
animation-charging-foreground = ${colors.yellow}
animation-charging-framerate = 750

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
label-layout = %layout%
label-layout-font = 3
label-layout-foreground = ${colors.pink}
label-layout-padding = 1

[module/date]
type = internal/date
interval = 1
date = %a, %d %b %H:%M
format = <label>
format-background = ${colors.surface0}
format-padding = 2
label = %date%
label-foreground = ${colors.pink}

[module/network]
type = custom/script
exec = ~/.dotfiles/config/polybar/network.sh
interval = 5
label = %output%
label-padding = 1

[module/powermenu]
type = custom/text
label = ""
label-foreground = ${colors.red}
label-padding = 1
click-left = ~/.dotfiles/config/polybar/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
